spring:
  application:
    name: parish-celebrations
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/parish?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:parish}
    password: ${SPRING_DATASOURCE_PASSWORD:parish_dev}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

server:
  port: ${PORT:8080}
  error:
    include-message: always

logging:
  level:
    com.parish.celebrations: INFO

app:
  jwt:
    secret: ${JWT_SECRET:kairos-parish-super-secret-key-for-jwt-signing-must-be-long-enough-256bits}
    expiration-ms: 86400000
